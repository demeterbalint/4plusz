<div class="publications-div">
  <div class="publications-background">
    <div class="publications-titles">
      <span class="publications-title">{{ title[currentLang] }}</span>
      <span class="publications-subtitle">{{ subtitle[currentLang] }}</span>
    </div>
  </div>
  <div class="publications-flex">
    <div class="publication-item" *ngFor="let publication of publicationsData">
      <div class="publication-item-width">
        <a class="item-image-div" target="_blank" href="{{ publication.link }}">
          <img src="{{ publication.imageURL }}" alt="{{ publication.title[currentLang] }}">
        </a>
        <div class="item-text-div">
          <span class="item-text-div-title">{{ publication.title[currentLang] }}</span>
          <a target="_blank" href="{{ publication.link }}" class="item-text-div-site">{{ publication.site }}</a>
          <span class="item-text-div-snippet">{{ publication.snippet[currentLang] }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
