<div class="projects-div">
  <div class="projects-grid">
    <div class="grid-item" *ngFor="let item of projects">
      <a [routerLink]="['/projects', item.slug]">
        <img [src]="getGridImage(item)" [alt]="getGridImage(item).toString()">
        <div class="text-background"></div>
        <div class="grid-text">
          <h2>{{ item.name[currentLang] }}</h2>
          <span>{{ item.gridShort[currentLang] }}</span>
        </div>
      </a>
    </div>
  </div>
</div>
