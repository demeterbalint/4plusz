<div class="projects-div">
  <div class="projects-grid">
    <div class="grid-item" *ngFor="let item of projects" [routerLink]="['/projects', item.slug]">
      <img [src]="getGridImage(item)" [alt]="getGridImage(item).toString()">
      <div class="text-background"></div>
      <div class="grid-text">
        <h1 class="grid-title">{{ item.name[currentLang] }}</h1>
        <span class="grid-short">{{ item.gridShort[currentLang] }}</span>
      </div>
    </div>
  </div>
</div>
