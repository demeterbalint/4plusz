<div class="contact-div">
  <div class="contact-background">
    <img src="{{backgroundURL}}" alt="background img">
    <div class="contact-box">
      <div class="contact-titles">
        <span class="contact-title">{{ contactData.addressTitle[currentLang] }}</span>
        <span class="contact-title">{{ contactData.phoneTitle[currentLang] }}</span>
        <span class="contact-title">{{ contactData.emailTitle[currentLang] }}</span>
        <span class="contact-title">{{ contactData.followTitle[currentLang] }}</span>
      </div>
      <div class="contact-datas">
        <span class="contact-data">{{ contactData.address[currentLang] }}</span>
        <span class="contact-data" >{{ contactData.phone[currentLang] }}</span>
        <span class="contact-data" >{{ contactData.email[currentLang] }}</span>
        <div class="follow-socials">
          <div class="social-border">
            <a class="fa-brands fa-facebook-f" target="_blank" href="https://www.facebook.com/4plusz"></a>
          </div>
          <div class="social-border">
            <a class="fa-brands fa-instagram" target="_blank" href="https://www.instagram.com/4plusz/"></a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="contact-maps">
    <iframe src="https://www.google.com/maps?q=47.48223,19.05274&z=15&output=embed"
            width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
  </div>
</div>
